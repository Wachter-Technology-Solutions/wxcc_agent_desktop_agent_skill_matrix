<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WxCC Agent Desktop Agent Skill Matrix</title>
    <link rel="stylesheet" href="./src/index.css" />
    <script src="/local-config.js"></script>
    <script type="module" src="/src/my-element.ts"></script>
  </head>
  <body>
    <script>
      const config = window.LOCAL_CONFIG || {}
      const widget = document.createElement('agent-skill-matrix-dashboard')

      widget.setAttribute('token', config.token || '')
      widget.setAttribute('org-id', config.orgId || '')
      widget.setAttribute('base-url', config.baseUrl || 'https://api.wxcc-us1.cisco.com')
      widget.setAttribute('refresh-ms', String(config.refreshMs ?? 30000))
      widget.setAttribute('darkmode', String(Boolean(config.darkmode)))

      document.body.appendChild(widget)
    </script>
  </body>
</html>
